name: Build and Deploy

on:
  push:
    branches:
      - dev
      - feature-dev
      - qa
      - prod

jobs:
  checkout-code:
    name: Checkout Code
    runs-on: ubuntu-latest
    outputs:
      safe_tag: ${{ steps.branch_tag.outputs.tag }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Get safe tag from branch name
        id: branch_tag
        run: |
          BRANCH=${{ github.ref_name }}
          SAFE_TAG=$(echo "$BRANCH" | tr '/' '-')
          echo "tag=$SAFE_TAG" >> $GITHUB_OUTPUT

  build-angular:
    name: Build Angular App
    runs-on: ubuntu-latest
    needs: checkout-code
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build Angular app
        run: npm run build

  build-docker-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [checkout-code, build-angular]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image with branch tag
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/portfolio-v1:${{ needs.checkout-code.outputs.safe_tag }} .

  push-dockerhub:
    name: Push Docker Image to DockerHub
    runs-on: ubuntu-latest
    needs: build-docker-image
    steps:
      - name: Log in to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/portfolio-v1:${{ needs.checkout-code.outputs.safe_tag }}

  run-container:
    name: Run Docker Container
    runs-on: ubuntu-latest
    needs: push-dockerhub
    steps:
      - name: Pull Docker image
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/portfolio-v1:${{ needs.checkout-code.outputs.safe_tag }}

      - name: Run Docker container
        run: |
          docker run -d -p 8080:80 --name portfolio-v1 ${{ secrets.DOCKER_USERNAME }}/portfolio-v1:${{ needs.checkout-code.outputs.safe_tag }}

  test-container:
    name: Test Deployed Container
    runs-on: ubuntu-latest
    needs: run-container
    steps:
      - name: Wait for container to be ready
        run: sleep 10

      - name: Test container with curl
        run: echo "Test Pass"
        # You can replace this with actual curl test:
        # curl -I http://localhost:8080

  discord-notify:
    name: Discord Notification
    runs-on: ubuntu-latest
    needs: [test-container, checkout-code]
    if: always()
    steps:
      - name: Send Discord notification to branch-specific channel
        run: |
          BRANCH="${{ github.ref_name }}"
          SAFE_TAG=$(echo "$BRANCH" | tr '/' '-')
          STATUS_RESULT="${{ needs.test-container.result }}"

          if [ "$STATUS_RESULT" = "success" ]; then
            STATUS="✅ *Build passed* on branch \`$BRANCH\`"
          else
            STATUS="❌ *Build failed* on branch \`$BRANCH\`"
          fi

          case "$BRANCH" in
            dev)
              WEBHOOK="${{ secrets.DISCORD_DEV_WEBHOOK }}"
              ;;
            feature-dev)
              WEBHOOK="${{ secrets.DISCORD_FEATURE_WEBHOOK }}"
              ;;
            qa)
              WEBHOOK="${{ secrets.DISCORD_QA_WEBHOOK }}"
              ;;
            prod)
              WEBHOOK="${{ secrets.DISCORD_PROD_WEBHOOK }}"
              ;;
            *)
              echo "No webhook configured for branch: $BRANCH"
              exit 0
              ;;
          esac

          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{\"content\": \"$STATUS\n📦 Repo: ${{ github.repository }}\n🔗 [View Workflow](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\"}" \
            "$WEBHOOK"
