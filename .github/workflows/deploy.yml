name: Angular Deployment

on:
  push:
    branches:
      - dev
      - qa
      - prod

jobs:
  checkout-code:
    name: Checkout Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

  build-angular:
    name: Build Angular App
    runs-on: ubuntu-latest
    needs: checkout-code
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build Angular app
        run: npm run build --prod

  build-docker-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-angular
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/portfolio-v1:${{ github.ref_name }} .

  push-dockerhub:
    name: Push Docker Image to DockerHub
    runs-on: ubuntu-latest
    needs: build-docker-image
    steps:
      - uses: actions/checkout@v4

      - name: Log in to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/portfolio-v1:${{ github.ref_name }}

  run-container:
    name: Run Docker Container
    runs-on: ubuntu-latest
    needs: push-dockerhub
    steps:
      - name: Pull Docker image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/portfolio-v1:${{ github.ref_name }}

      - name: Run Docker container
        run: |
          docker run -d -p 8080:80 --name portfolio-v1 ${{ secrets.DOCKER_USERNAME }}/portfolio-v1:${{ github.ref_name }}

  test-container:
    name: Test Deployed Container
    runs-on: ubuntu-latest
    needs: run-container
    steps:
      - name: Wait for container to be ready
        run: sleep 10

      - name: Test container with curl
        run: |
          curl -I http://localhost:8080

  deploy:
    name: Deploy to Appropriate Server
    runs-on: ubuntu-latest
    needs: test-container
    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to appropriate server
        run: |
          BRANCH=${{ github.ref_name }}
          if [[ "$BRANCH" == "dev" ]]; then
            SERVER_IP=${{ secrets.DEV_SERVER_IP }}
          elif [[ "$BRANCH" == "qa" ]]; then
            SERVER_IP=${{ secrets.QA_SERVER_IP }}
          elif [[ "$BRANCH" == "prod" ]]; then
            SERVER_IP=${{ secrets.PROD_SERVER_IP }}
          fi

          ssh -o StrictHostKeyChecking=no user@$SERVER_IP << EOF
            docker pull ${{ secrets.DOCKER_USERNAME }}/portfolio-v1:$BRANCH
            docker stop portfolio-v1 || true
            docker rm portfolio-v1 || true
            docker run -d -p 8080:80 --name portfolio-v1 ${{ secrets.DOCKER_USERNAME }}/portfolio-v1:$BRANCH
          EOF
