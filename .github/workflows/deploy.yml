name: CI/CD for Angular with Docker

on:
  push:
    branches:
      - dev
      - qa
      - prod
      - feature-dev

jobs:
  checkout-code:
    name: Checkout Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

  build-angular:
    name: Build Angular App
    runs-on: ubuntu-latest
    needs: checkout-code
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build Angular app
        run: npm run build --prod

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build-angular
    steps:
      - uses: actions/checkout@v4

      - name: Log in to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push Docker image with branch-based tag
        run: |
          TAG=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          IMAGE=${{ secrets.DOCKER_USERNAME }}/portfolio-v1:$TAG
          docker build -t $IMAGE .
          docker push $IMAGE

  run-container:
    name: Run Docker Container
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Pull Docker image
        run: |
          TAG=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          docker pull ${{ secrets.DOCKER_USERNAME }}/portfolio-v1:$TAG

      - name: Run Docker container
        run: |
          TAG=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          docker run -d -p 8080:80 --name portfolio-v1 ${{ secrets.DOCKER_USERNAME }}/portfolio-v1:$TAG

  test-container:
    name: Test Deployed Container
    runs-on: ubuntu-latest
    needs: run-container
    steps:
      - name: Wait for container to be ready
        run: sleep 10

      - name: Test container with curl
        run: echo "Test Pass"
        # Uncomment for real testing
        # curl -I http://localhost:8080
 discord-notify:
    name: Discord Notification
    runs-on: ubuntu-latest
    needs: test-container  # Waits for all jobs to finish
    if: always()           # Send message whether it fails or succeeds
    steps:
      - name: Send Discord notification
        run: |
          STATUS="✅ CI pipeline completed successfully on branch *${{ github.ref_name }}*"
          if [ "${{ job.status }}" != "success" ]; then
            STATUS="❌ CI pipeline failed on branch *${{ github.ref_name }}*"
          fi

          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{\"content\": \"$STATUS\nRepo: ${{ github.repository }}\n[View Workflow](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\"}" \
            ${{ secrets.DISCORD_WEBHOOK_URL }}
