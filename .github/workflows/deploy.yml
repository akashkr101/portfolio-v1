name: Build and Deploy

on:
  push:
    branches:
      - dev
      - qa
      - prod
      - feature-dev

jobs:
  checkout-code:
    name: Checkout Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

  build-angular:
    name: Build Angular App
    runs-on: ubuntu-latest
    needs: checkout-code
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build Angular app
        run: npm run build --prod

  build-docker-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-angular
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image with branch tag
        run: |
          BRANCH=${{ github.ref_name }}
          SAFE_TAG=$(echo "$BRANCH" | tr '/' '-')
          docker build -t ${{ secrets.DOCKER_USERNAME }}/portfolio-v1:$SAFE_TAG .

  push-dockerhub:
    name: Push Docker Image to DockerHub
    runs-on: ubuntu-latest
    needs: build-docker-image
    steps:
      - name: Log in to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Docker image
        run: |
          BRANCH=${{ github.ref_name }}
          SAFE_TAG=$(echo "$BRANCH" | tr '/' '-')
          docker push ${{ secrets.DOCKER_USERNAME }}/portfolio-v1:$SAFE_TAG

  run-container:
    name: Run Docker Container
    runs-on: ubuntu-latest
    needs: push-dockerhub
    steps:
      - name: Pull Docker image
        run: |
          BRANCH=${{ github.ref_name }}
          SAFE_TAG=$(echo "$BRANCH" | tr '/' '-')
          docker pull ${{ secrets.DOCKER_USERNAME }}/portfolio-v1:$SAFE_TAG

      - name: Run Docker container
        run: |
          BRANCH=${{ github.ref_name }}
          SAFE_TAG=$(echo "$BRANCH" | tr '/' '-')
          docker run -d -p 8080:80 --name portfolio-v1 ${{ secrets.DOCKER_USERNAME }}/portfolio-v1:$SAFE_TAG

  test-container:
    name: Test Deployed Container
    runs-on: ubuntu-latest
    needs: run-container
    steps:
      - name: Wait for container to be ready
        run: sleep 10

      - name: Test container with curl
        run: echo "Test Pass"
        # curl -I http://localhost:8080

  discord-notify:
    name: Discord Notification
    runs-on: ubuntu-latest
    needs: test-container
    if: always()
    steps:
      - name: Send Discord notification to branch-specific channel
        env:
          BRANCH: ${{ github.ref_name }}
          STATUS_DEV: ${{ needs.test-container.result }}
        run: |
          BRANCH_SAFE=$(echo "$BRANCH" | tr '/' '-')
          
          if [ "$STATUS_DEV" = "success" ]; then
            STATUS="✅ *Build passed* on branch \`$BRANCH\`"
          else
            STATUS="❌ *Build failed* on branch \`$BRANCH\`"
          fi

          case "$BRANCH" in
            dev)
              WEBHOOK="${{ secrets.DISCORD_DEV_WEBHOOK }}"
              ;;
            feature-dev)
              WEBHOOK="${{ secrets.DISCORD_FEATURE_WEBHOOK }}"
              ;;
            qa)
              WEBHOOK="${{ secrets.DISCORD_QA_WEBHOOK }}"
              ;;
            prod)
              WEBHOOK="${{ secrets.DISCORD_PROD_WEBHOOK }}"
              ;;
            *)
              echo "No webhook configured for branch: $BRANCH"
              exit 0
              ;;
          esac

          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{\"content\": \"$STATUS\n📦 Repo: ${{ github.repository }}\n🔗 [View Workflow](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\"}" \
            "$WEBHOOK"

