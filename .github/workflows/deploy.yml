name: Deploy Angular App to EKS and Setup Kubernetes Dashboard

on:
  workflow_run:
    workflows: ["Build Angular App and Docker Image"]
    types:
      - completed

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/my-angular-app:${{ github.event.workflow_run.head_branch }}-${{ github.run_number }}
  CLUSTER_NAME: your-eks-cluster-name
  CLUSTER_REGION: your-aws-region

jobs:
  checkout:
    name: Checkout Repository
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

  configure-aws:
    name: Configure AWS Credentials
    runs-on: ubuntu-latest
    needs: checkout
    steps:
    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.CLUSTER_REGION }}

    - name: Update kubeconfig
      run: aws eks update-kubeconfig --region $CLUSTER_REGION --name $CLUSTER_NAME

  install-helm:
    name: Install Helm
    runs-on: ubuntu-latest
    needs: configure-aws
    steps:
    - name: Install Helm
      uses: azure/setup-helm@v3
      with:
        version: v3.13.2

  deploy-angular:
    name: Deploy Angular App via Helm
    runs-on: ubuntu-latest
    needs: install-helm
    steps:
    - name: Helm Upgrade Angular App
      run: |
        helm upgrade --install my-angular-app ./helm/my-angular-app \
          --set image.repository=${{ secrets.DOCKERHUB_USERNAME }}/my-angular-app \
          --set image.tag=${{ github.event.workflow_run.head_branch }}-${{ github.run_number }}

  deploy-dashboard:
    name: Deploy Kubernetes Dashboard
    runs-on: ubuntu-latest
    needs: deploy-angular
    steps:
    - name: Deploy Kubernetes Dashboard
      run: |
        if ! kubectl get deployment kubernetes-dashboard -n kubernetes-dashboard; then
          echo "Dashboard not found. Deploying now..."
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/dashboard/v2.7.0/aio/deploy/recommended.yaml
          
          kubectl patch svc kubernetes-dashboard -n kubernetes-dashboard -p '{"spec": {"type": "LoadBalancer"}}'
          
          echo "Waiting for LoadBalancer..."
          sleep 30
          kubectl get svc kubernetes-dashboard -n kubernetes-dashboard
        else
          echo "Dashboard already deployed. Skipping."
        fi

  get-dashboard-url:
    name: Fetch Kubernetes Dashboard URL
    runs-on: ubuntu-latest
    needs: deploy-dashboard
    outputs:
      dashboard-url: ${{ steps.fetch.outputs.dashboard-url }}
    steps:
    - name: Fetch LoadBalancer URL
      id: fetch
      run: |
        DASHBOARD_URL=$(kubectl get svc kubernetes-dashboard -n kubernetes-dashboard -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        echo "Dashboard URL: http://${DASHBOARD_URL}"
        echo "::set-output name=dashboard-url::http://${DASHBOARD_URL}"

  notify:
    name: Notifications
    runs-on: ubuntu-latest
    needs: get-dashboard-url
    if: always()
    steps:
    - name: Discord Notification - Deployment Complete
      uses: Ilshidur/action-discord@master
      with:
        webhook: ${{ secrets.DISCORD_WEBHOOK }}
        message: |
          **Deployment Completed:** `${{ github.workflow }}` for branch `${{ github.event.workflow_run.head_branch }}`
          Status: ${{ job.status }}
          Dashboard URL: ${{ needs.get-dashboard-url.outputs.dashboard-url }}

