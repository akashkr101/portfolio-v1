name: Build Angular App and Docker Image

on:
  push:
    branches:
      - uat

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/my-angular-app:${{ github.ref_name }}-${{ github.run_number }}

jobs:
  checkout:
    name: Checkout Source Code
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

  setup-node:
    name: Setup Node.js
    runs-on: ubuntu-latest
    needs: checkout
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: |
          npm install

  lint-test:
    name: Lint and Unit Test
    runs-on: ubuntu-latest
    needs: setup-node
    steps:
    - name: Lint Code
      run: npm run lint
      working-directory: ./portfolio-v1
    - name: Run Unit Tests
      run: npm run test -- --watch=false --browsers=ChromeHeadless
      working-directory: ./portfolio-v1

  sonarqube-scan:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
    - name: SonarQube Analysis
      uses: sonarsource/sonarcloud-github-action@v2
      with:
        projectBaseDir: .
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  quality-gate-check:
    name: Quality Gate Check
    runs-on: ubuntu-latest
    needs: sonarqube-scan
    steps:
    - name: Wait for Quality Gate
      uses: sonarsource/sonarcloud-quality-gate-action@v1
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  trivy-scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    needs: quality-gate-check
    steps:
    - name: Trivy Filesystem Scan
      uses: aquasecurity/trivy-action@v0.11.2
      with:
        scan-type: 'fs'
        scan-ref: '.'

  angular-build:
    name: Build Angular App
    runs-on: ubuntu-latest
    needs: trivy-scan
    steps:
    - name: Build Angular
      run: npm run build -- --configuration production

  docker-build-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: angular-build
    steps:
    - name: Docker Build
      run: docker build -t $DOCKER_IMAGE .
    - name: DockerHub Login
      run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
    - name: Push Docker Image
      run: docker push $DOCKER_IMAGE

  notify:
    name: Notifications
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: always()
    steps:
    - name: Discord Notification - Build Complete
      uses: Ilshidur/action-discord@master
      with:
        webhook: ${{ secrets.DISCORD_WEBHOOK }}
        message: |
          **Build Completed:** `${{ github.workflow }}` for branch `${{ github.ref_name }}`
          Status: ${{ job.status }}

